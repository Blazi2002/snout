name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest"
            args: ""
          # Linux temporaneamente disabilitato: il linking di ONNX Runtime
          # richiede una configurazione dedicata, da affrontare separatamente.

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./snout-app/src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./snout-app

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./snout-app
          tagName: ${{ github.ref_name }}
          releaseName: "Snout ${{ github.ref_name }}"
          releaseBody: "Download Snout for your platform from the assets below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
