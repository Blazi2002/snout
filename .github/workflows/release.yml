name: Release

# Scatta quando viene pushato un tag che inizia con "v" (es. v0.1.0).
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"   # Mac (Apple Silicon + Intel)
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"   # Linux
            args: ""
          - platform: "windows-latest" # Windows
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Dipendenze di sistema richieste da Tauri su Linux.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Su macOS aggiungiamo i target per il binario universale.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Cache delle dipendenze Rust, per velocizzare i build successivi.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./snout-app/src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./snout-app

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./snout-app
          tagName: ${{ github.ref_name }}
          releaseName: "Snout ${{ github.ref_name }}"
          releaseBody: "See the assets below to download Snout for your platform."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
